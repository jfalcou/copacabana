name: Copacabana
on:
  workflow_call:

jobs:

  test-cpack:
    name: Build and Verify System Installers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
      - name: Setup CMake
        uses: lukka/get-cmake@latest
      - name: Configure Project
        run: |
          cd example
          cmake -B build -S . -DCPM_COPACABANA_SOURCE=$GITHUB_WORKSPACE
      - name: Build Project
        run: |
          cd example
          cmake --build build
      - name: Generate CPack Installers
        run: |
          cd example
          cmake --build build --target package
      - name: Verify DEB Package Validity
        run: |
          cd example
          # Find the generated .deb file
          DEB_FILE=$(ls build/*.deb | head -n 1)
          echo "Validating DEB Package: $DEB_FILE"

          echo "--- DEB Metadata ---"
          dpkg-deb -I "$DEB_FILE"

          echo "--- DEB File Contents ---"
          dpkg-deb -c "$DEB_FILE"

      - name: Verify RPM Package Validity
        run: |
          cd example
          # Find the generated .rpm file
          RPM_FILE=$(ls build/*.rpm | head -n 1)
          echo "Validating RPM Package: $RPM_FILE"

          echo "--- RPM Metadata ---"
          rpm -qpi "$RPM_FILE"

          echo "--- RPM Dependencies ---"
          rpm -qpR "$RPM_FILE"

          echo "--- RPM File Contents ---"
          rpm -qpl "$RPM_FILE"

  verify-hierarchy:
    name: Verify Ninja Target Hierarchy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Configure Project
        run: |
          cd example
          cmake -G Ninja -B build -S . \
                -DCPM_COPACABANA_SOURCE=$GITHUB_WORKSPACE \
                -DOPT_QUIET=ON

      - name: Check Hierarchical Phony Targets
        run: |
          cd example/build
          # Dump the full list of Ninja targets
          ninja -t targets > all_targets.txt

          EXPECTED=(
            "unit.exe"
            "unit.types.exe"
            "unit.types.structure.exe"
            "unit.values.exe"
            "unit.values.value.exe"
            "unit.values.version.exe"
          )

          STATUS=0
          for target in "${EXPECTED[@]}"; do
            if grep -q "^$target:" all_targets.txt; then
              echo "✅ Found $target"
            else
              echo "❌ Missing $target"
              STATUS=1
            fi
          done

          exit $STATUS