name: Copacabana - Unit Tests
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:
    name: Linux Unit Tests
    uses: ./.github/workflows/linux.yml

  macosx:
    name: Mac OS X Unit Tests
    uses: ./.github/workflows/macos.yml

