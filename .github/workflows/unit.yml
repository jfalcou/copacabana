name: Unit Tests
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: unit-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:
    name: Linux
    uses: ./.github/workflows/linux.yml

  macosx:
    name: Mac OS X
    uses: ./.github/workflows/macos.yml

  windows:
    name: Windows
    uses: ./.github/workflows/windows.yml

  packages:
    name: Packages
    uses: ./.github/workflows/packages.yml

  targets:
    - name: Verify Ninja Target Hierarchy
      run: |
        ninja -C build -t targets > actual_targets.txt
        grep -E "^unit\.exe:" actual_targets.txt
        grep -E "^unit\.types\.exe:" actual_targets.txt
        grep -E "^unit\.types\.structure\.exe:" actual_targets.txt
        grep -E "^unit\.values\.exe:" actual_targets.txt